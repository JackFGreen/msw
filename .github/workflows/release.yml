name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm check

      - run: pnpm build

      - run: pnpm test

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - run: |
          echo "npm: $(npm --version)"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL set: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"
          echo "NODE_AUTH_TOKEN set: ${NODE_AUTH_TOKEN:+yes}"
          cat "${NPM_CONFIG_USERCONFIG}" 2>/dev/null && echo "---npmrc above---"
          unset NODE_AUTH_TOKEN
          npm config delete //registry.npmjs.org/:_authToken
          npm publish --provenance --loglevel verbose
